name: Daily Engineering Report

on:
  schedule:
    - cron: '30 7 * * *'   # 07:30 UTC = 1:00 PM IST, every day
  workflow_dispatch: {}

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - name: Call the report endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_URL: https://engineering-dashboard-theta.vercel.app
        run: |
          echo "Triggering daily report..."
          code=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_URL}/api/report")
          echo "HTTP status: ${code}"
          echo "Response:"; cat /tmp/resp.json; echo
          test "${code}" = "200"
